name: Build OPPO Kernel (Coolapk Method)

on:
  workflow_dispatch:
    inputs:
      # 默认分支已设为正确的 sm6375 分支
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libssl-dev bc flex bison git zip unzip curl wget tar xz-utils cpio rsync lzop xz-utils zstd libncurses-dev libffi-dev libbz2-dev dnsutils net-tools lsb-release aria2 pigz llvm clang lld dwarves libelf-dev libssl-dev

      # 第一步：拉取闭源驱动
      - name: Clone Proprietary Drivers
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} proprietary_drivers

      - name: Move Driver Folders to Root
        run: |
          # 1. 移动 vendor 文件夹
          if [ -d "proprietary_drivers/vendor" ]; then
            echo "Moving vendor folder..."
            sudo mv proprietary_drivers/vendor /
          fi
          
          # 2. 移动内核平台文件夹 (酷安教程里叫 Kernel_platform)
          if [ -d "proprietary_drivers/Kernel_platform" ]; then
            echo "Moving Kernel_platform folder..."
            sudo mv proprietary_drivers/Kernel_platform /
          fi
          
          # 3. 移动内核文件夹 (以防万一)
          if [ -d "proprietary_drivers/Kernel" ]; then
            echo "Moving Kernel folder..."
            sudo mv proprietary_drivers/Kernel /
          fi
          
          # 清理残留
          rm -rf proprietary_drivers

      # 第二步：拉取内核源码
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} kernel_source

      - name: Prepare Directory Structure (Key Step!)
        run: |
          # 酷安教程核心步骤：把源码文件夹重命名为 common
          # 首先判断根目录有没有 Kernel 或 Kernel_platform
          if [ -d "/Kernel" ]; then
            echo "Found /Kernel, renaming to /Kernel/common..."
            sudo mv /Kernel /Kernel_temp
            sudo mkdir -p /Kernel/common
            sudo mv /Kernel_temp/* /Kernel/common/
            sudo rm -rf /Kernel_temp
            
          elif [ -d "/Kernel_platform" ]; then
            echo "Found /Kernel_platform, renaming to /Kernel_platform/common..."
            sudo mv /Kernel_platform /Kernel_platform_temp
            sudo mkdir -p /Kernel_platform/common
            sudo mv /Kernel_platform_temp/* /Kernel_platform/common/
            sudo rm -rf /Kernel_platform_temp
          else
            echo "Error: Could not find Kernel base directory!"
            exit 1
          fi

      # 第三步：编译 (完全复刻酷安指令)
      - name: Build Kernel Configuration
        run: |
          # 动态获取路径
          if [ -d "/Kernel/common" ]; then
            cd /Kernel/common
          elif [ -d "/Kernel_platform/common" ]; then
            cd /Kernel_platform/common
          fi
          
          echo "Current directory: $(pwd)"
          echo "Running make gki_defconfig..."
          
          # 执行编译配置
          make ARCH=arm64 LLVM=1 O=out gki_defconfig

      - name: Compile Kernel Image
        run: |
          # 动态获取路径
          if [ -d "/Kernel/common" ]; then
            cd /Kernel/common
          elif [ -d "/Kernel_platform/common" ]; then
            cd /Kernel_platform/common
          fi
          
          echo "Starting compilation..."
          # 使用 nproc 自动获取CPU核心数加速编译
          make ARCH=arm64 LLVM=1 O=out -j$(nproc) Image

      # 第四步：上传产物
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: A1_5G_Kernel_Image
          path: |
            /Kernel*/out/arch/arm64/boot/Image

name: Build OPPO Kernel

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm7325'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      defconfig:
        description: '内核配置文件'
        required: true
        default: 'gki_defconfig'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. 检出 Actions 脚本
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装基础依赖和 Clang
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential bc flex bison git curl tar xz-utils cpio rsync lzop libncurses-dev libssl-dev clang llvm lld

      # 3. 下载并设置 AOSP GCC 4.9 (教程指定版本)
      - name: Setup AOSP GCC Toolchain
        run: |
          sudo mkdir -p /home/ubuntu
          sudo chown -R $USER:$USER /home/ubuntu
          cd /home/ubuntu
          
          echo "Downloading GCC 4.9 (64-bit)..."
          wget --tries=0 --waitretry=30 -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz -O gcc64.tar.gz
          mkdir -p Gcc_64
          tar -xzf gcc64.tar.gz -C Gcc_64/ --strip-components=1
          rm gcc64.tar.gz
          
          echo "Downloading GCC 4.9 (32-bit)..."
          wget --tries=0 --waitretry=30 -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/master.tar.gz -O gcc32.tar.gz
          mkdir -p Gcc_32
          tar -xzf gcc32.tar.gz -C Gcc_32/ --strip-components=1
          rm gcc32.tar.gz
          
          echo "GCC Toolchain setup finished."

      # 4. 导出环境变量 (严格复刻教程)
      - name: Export Environment Variables
        run: |
          echo "Exporting environment variables..."
          echo "export PATH=/usr/lib/llvm-18/bin:$PATH" >> $GITHUB_ENV
          echo "export CROSS_COMPILE=/home/ubuntu/Gcc_64/bin/aarch64-linux-android-" >> $GITHUB_ENV
          echo "export CROSS_COMPILE_ARM32=/home/ubuntu/Gcc_32/bin/arm-linux-androideabi-" >> $GITHUB_ENV
          echo "export CC=clang" >> $GITHUB_ENV
          echo "export LD=ld.lld" >> $GITHUB_ENV
          echo "export LLVM=1" >> $GITHUB_ENV
          echo "export LLVM_IAS=1" >> $GITHUB_ENV
          source $GITHUB_ENV

      # 5. 克隆闭源驱动仓库 (教程指定位置: /home/ubuntu/modules)
      - name: Clone Proprietary Drivers
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} /home/ubuntu/modules

      # 6. 【核心修正】移动闭源文件夹 (严格执行教程命令)
      - name: Move Proprietary Folders
        run: |
          cd /home/ubuntu/modules
          
          # 教程命令 1: 移动 vendor
          if [ -d "vendor" ]; then
            echo "Moving vendor to /home/ubuntu/"
            mv vendor /home/ubuntu/
          else
            echo "Warning: 'vendor' folder not found!"
          fi
          
          # 教程命令 2: 移动 techpack 内容
          # 注意：教程要求移动的是 modules/kernel/msm-5.4/techpack/*
          if [ -d "kernel/msm-5.4/techpack" ]; then
            echo "Moving techpack files to kernel source..."
            # 确保目标目录存在
            mkdir -p /home/ubuntu/kernel/msm-5.4/techpack/
            mv kernel/msm-5.4/techpack/* /home/ubuntu/kernel/msm-5.4/techpack/
          else
            echo "Warning: 'kernel/msm-5.4/techpack' not found in modules!"
          fi
          
          # 清理
          cd /home/ubuntu
          rm -rf modules

      # 7. 克隆内核源码 (教程指定位置: /home/ubuntu/kernel/msm-5.4)
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} /home/ubuntu/kernel/msm-5.4
            
          echo "Kernel source structure:"
          ls -la /home/ubuntu/kernel/msm-5.4/

      # 8. 编译内核
      - name: Build Kernel
        run: |
          cd /home/ubuntu/kernel/msm-5.4
          
          echo "Generating defconfig: ${{ github.event.inputs.defconfig }}"
          make O=out ARCH=arm64 ${{ github.event.inputs.defconfig }}
          
          echo "Starting compilation..."
          make O=out ARCH=arm64 -j$(nproc --all)

      # 9. 上传产物
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: /home/ubuntu/kernel/msm-5.4/out/arch/arm64/boot/Image

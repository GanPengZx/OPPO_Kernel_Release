name: Build OPPO Kernel

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      defconfig:
        description: '内核配置文件'
        required: true
        default: 'gki_defconfig'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. 检出 Actions 脚本
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装基础依赖 (使用系统内置 Clang 18)
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y wget git tar build-essential bc flex bison libssl-dev \
                               libncurses-dev xz-utils cpio rsync lzop \
                               clang llvm lld \
                               gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
                               gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      # 3. 下载并设置 GCC 4.9 工具链 (路径严格按你的要求)
      - name: Setup GCC Toolchain
        run: |
          sudo mkdir -p /Gcc_64
          cd /Gcc_64
          echo "Downloading GCC 4.9 (64-bit)..."
          wget --tries=0 --waitretry=30 -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz -O gcc64.tar.gz
          tar -xzf gcc64.tar.gz --strip-components=1
          rm gcc64.tar.gz
          
          sudo mkdir -p /Gcc_32
          cd /Gcc_32
          echo "Downloading GCC 4.9 (32-bit)..."
          wget --tries=0 --waitretry=30 -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/heads/master.tar.gz -O gcc32.tar.gz
          tar -xzf gcc32.tar.gz --strip-components=1
          rm gcc32.tar.gz
          
          echo "GCC Toolchain setup finished."

      # 4. 克隆闭源驱动仓库 (到临时目录)
      - name: Clone Proprietary Drivers
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} /tmp/proprietary

      # 5. 移动闭源文件夹到根目录 (严格执行你的命令)
      - name: Move Proprietary Folders to Root
        run: |
          sudo mv /tmp/proprietary/kernel /
          sudo mv /tmp/proprietary/vendor /
          sudo rm -rf /tmp/proprietary

      # 6. 克隆开源内核源码到 /modules
      - name: Clone Kernel Source to /modules
        run: |
          sudo rm -rf /modules
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} /modules

      # 7. 移动 modules 中的文件夹 (严格执行你的命令)
      - name: Move Modules Folders
        run: |
          # 确保目标目录存在
          sudo mkdir -p /kernel/msm-5.4/techpack
          
          # 执行你的移动命令
          sudo mv /modules/vendor /
          sudo mv /modules/kernel/msm-5.4/techpack/* /kernel/msm-5.4/techpack/
          
          sudo rm -rf /modules

      # 8. 修复权限
      - name: Fix Permissions
        run: |
          sudo chown -R $USER:$USER /kernel
          sudo chmod -R 755 /kernel

      # 9. 编译内核 (使用系统内置 Clang 18，严格执行你的命令)
      - name: Build Kernel
        run: |
          cd /kernel/msm-5.4/
          
          # 导出环境变量 (使用系统内置 Clang 18)
          export PATH=/usr/lib/llvm-18/bin:$PATH
          
          echo "Generating defconfig: ${{ github.event.inputs.defconfig }}"
          make -j$(nproc --all) CC="clang" O=out ARCH=arm64 LD=ld.lld LLVM=1 LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=/Gcc_64/bin/aarch64-linux-android- \
               CROSS_COMPILE_ARM32=/Gcc_32/bin/arm-linux-androideabi- \
               ${{ github.event.inputs.defconfig }}
          
          echo "Starting compilation..."
          make -j$(nproc --all) CC="clang" O=out ARCH=arm64 LD=ld.lld LLVM=1 LLVM_IAS=1 \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE=/Gcc_64/bin/aarch64-linux-android- \
               CROSS_COMPILE_ARM32=/Gcc_32/bin/arm-linux-androideabi-

      # 10. 上传产物
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: /kernel/msm-5.4/out/arch/arm64/boot/Image

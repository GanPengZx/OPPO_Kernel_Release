name: Build OPPO Kernel

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          sudo apt install -y build-essential libssl-dev bc flex bison git zip unzip curl wget tar xz-utils cpio rsync lzop xz-utils zstd libncurses-dev libffi-dev libbz2-dev dnsutils net-tools lsb-release aria2 pigz llvm clang lld dwarves libelf-dev libssl-dev
      - name: Clone Proprietary Drivers
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} proprietary_drivers
      - name: Move Folders
        run: |
          cd proprietary_drivers
          if [ -d "vendor" ]; then
            echo "Moving vendor to /..."
            sudo mv vendor /
          fi
          if [ -d "kernel" ]; then
            echo "Moving kernel to /..."
            sudo mv kernel /
          else
            echo "Error: 'kernel' folder not found!"
            ls -la
            exit 1
          fi
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} kernel_source
      - name: Prepare Directory Structure
        run: |
          echo "Creating /kernel/common..."
          sudo mkdir -p /kernel/common
          echo "Moving kernel source to /kernel/common..."
          sudo mv kernel_source/* /kernel/common/
          sudo rm -rf kernel_source
          echo "Final structure:"
          ls -la /kernel/
          ls -la /kernel/common/
      - name: Build Kernel
        run: |
          sudo chown -R $USER:$USER /kernel
          cd /kernel/common
          echo "Running make gki_defconfig..."
          make ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CC=clang O=out gki_defconfig
          echo "Starting compilation..."
          sed -i 's/register_vendor_hooks()/register_vendor_hooks(void)/g' kernel/special_opt/special_opt.c || true
          make ARCH=arm64 CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CC=clang O=out -j$(nproc) Image
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: /kernel/common/out/arch/arm64/boot/Image

name: Build OPPO Kernel

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libssl-dev bc flex bison git zip unzip curl wget tar xz-utils cpio rsync lzop xz-utils zstd libncurses-dev libffi-dev libbz2-dev dnsutils net-tools lsb-release aria2 pigz llvm clang lld dwarves libelf-dev libssl-dev

      - name: Clone Proprietary Drivers
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} proprietary_drivers

      - name: Move Driver Folders to Root
        run: |
          cd proprietary_drivers
          
          # 查找并移动 vendor 文件夹
          if [ -d "vendor" ]; then
            echo "Moving vendor folder..."
            sudo mv vendor /
          fi
          
          # 查找并移动 Kernel 或 Kernel_platform 文件夹（不区分大小写）
          KERNEL_DIR=$(find . -maxdepth 1 -type d \( -iname "Kernel" -o -iname "Kernel_platform" \) | head -n 1)
          
          if [ -n "$KERNEL_DIR" ]; then
            echo "Found driver directory: $KERNEL_DIR"
            sudo mv "$KERNEL_DIR" /
          else
            echo "Error: No Kernel or Kernel_platform directory found!"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} kernel_source

      - name: Prepare Kernel Directory Structure
        run: |
          # 确定内核根目录（不区分大小写）
          if [ -d "/Kernel_platform" ]; then
            KERNEL_ROOT="/Kernel_platform"
          elif [ -d "/Kernel" ]; then
            KERNEL_ROOT="/Kernel"
          elif [ -d "/kernel_platform" ]; then
            KERNEL_ROOT="/kernel_platform"
          elif [ -d "/kernel" ]; then
            KERNEL_ROOT="/kernel"
          else
            echo "Error: Kernel root directory not found!"
            echo "Root directory contents:"
            ls -la /
            exit 1
          fi
          
          echo "Using kernel root: $KERNEL_ROOT"
          
          # 创建 common 文件夹并移动内核源码
          mkdir -p $KERNEL_ROOT/common
          mv kernel_source/* $KERNEL_ROOT/common/
          rm -rf kernel_source

      - name: Build Kernel Configuration
        run: |
          # 自动检测内核根目录
          KERNEL_ROOT=$(find / -maxdepth 1 -type d \( -iname "Kernel*" \) | head -n 1)
          cd $KERNEL_ROOT
          make ARCH=arm64 LLVM=1 O=out gki_defconfig

      - name: Compile Kernel
        run: |
          KERNEL_ROOT=$(find / -maxdepth 1 -type d \( -iname "Kernel*" \) | head -n 1)
          cd $KERNEL_ROOT
          make ARCH=arm64 LLVM=1 O=out -j8 Image

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: |
            /Kernel*/out/arch/arm64/boot/Image
            /kernel*/out/arch/arm64/boot/Image

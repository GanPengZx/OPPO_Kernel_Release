name: Build OPPO Kernel (Pure Clang)

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/GanPengZx/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      defconfig:
        description: '内核配置文件'
        required: true
        default: 'phs110_defconfig'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libssl-dev bc flex bison git zip unzip curl wget tar xz-utils cpio rsync lzop xz-utils zstd libncurses-dev libffi-dev libbz2-dev dnsutils net-tools lsb-release aria2 pigz llvm clang lld dwarves libelf-dev libssl-dev

      - name: Set swap to 20G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 20
      - name: Setup Clang r383902b1
        run: |
          cd /tmp
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/e532342f30eadb954c96d19ca6a0edf89a5c65bc.tar.gz"
          
          echo "====== 开始下载 Clang r383902b1 (官方源) ======"
          wget --progress=bar:force:noscroll -U "Mozilla/5.0" --content-disposition "$CLANG_URL"
          TAR_FILE=$(ls -S *.tar.gz *.tgz 2>/dev/null | head -n 1)
          if [ -z "$TAR_FILE" ]; then
            echo "Error: Clang 压缩包下载失败！"
            exit 1
          fi
          echo "====== 正在解压 Clang 工具链... ======"
          sudo mkdir -p /opt/clang-r383902b1
          sudo tar -xzf "$TAR_FILE" -C /opt/clang-r383902b1
          rm -f "$TAR_FILE"
          
          echo "Clang setup finished."
          /opt/clang-r383902b1/bin/clang --version
      - name: Clone Proprietary Drivers to /modules
        run: |
          sudo rm -rf /modules
          sudo git clone --depth=1 --branch ${{ github.event.inputs.proprietary_branch }} \
            ${{ github.event.inputs.proprietary_repo }} /modules
      - name: Clone Kernel Source to /kernel/msm-5.4
        run: |
          sudo rm -rf /kernel/msm-5.4
          sudo mkdir -p /kernel
          sudo git clone --depth=1 --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} /kernel/msm-5.4
      - name: Move Folders
        run: |
          echo "Current structure of /modules:"
          ls -R /modules
          
          if [ -d "/modules/vendor" ]; then
            echo "Moving /modules/vendor to /"
            sudo mv /modules/vendor /
          else
            echo "Error: /modules/vendor not found!"
            exit 1
          fi
          
          if [ -d "/modules/kernel/msm-5.4/techpack" ]; then
            echo "Moving techpack files..."
            sudo mkdir -p /kernel/msm-5.4/techpack
            sudo mv /modules/kernel/msm-5.4/techpack/* /kernel/msm-5.4/techpack/
          else
            echo "Error: /modules/kernel/msm-5.4/techpack not found!"
            exit 1
          fi
          
          sudo rm -rf /modules
      - name: Fix Permissions
        run: |
          sudo chown -R $USER:$USER /kernel
          sudo chmod -R 755 /kernel
          if [ -d "/vendor" ]; then
            sudo chown -R $USER:$USER /vendor
          fi

      - name: Build Kernel
        run: |
          cd /kernel/msm-5.4
          
          # 引入 Clang 路径
          export PATH=/opt/clang-r383902b1/bin:$PATH
          
          echo "Generating defconfig: ${{ github.event.inputs.defconfig }}"
          make -j$(nproc --all) \
               ARCH=arm64 \
               LLVM=1 \
               LLVM_IAS=0 \        # 关键：OPPO 内核汇编太老，必须关掉集成汇编器
               CC=clang \
               LD=ld.lld \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE="" \    # 关键：设为空，强制不使用 GCC
               ${{ github.event.inputs.defconfig }}
          
          echo "Starting compilation..."
          make -j$(nproc --all) \
               ARCH=arm64 \
               LLVM=1 \
               LLVM_IAS=0 \
               CC=clang \
               LD=ld.lld \
               CLANG_TRIPLE=aarch64-linux-gnu- \
               CROSS_COMPILE="" \
               Image

      # 9. 上传产物
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: /kernel/msm-5.4/out/arch/arm64/boot/Image

name: Build Old Kernel (LLVM Clang)

on:
  workflow_dispatch:
    inputs:
      proprietary_repo:
        description: '闭源驱动仓库地址'
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375'
      proprietary_branch:
        description: '闭源驱动仓库分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_repo:
        description: '内核源码仓库地址'
        required: true
        default: 'https://github.com/GanPengZx/android_kernel_oppo_sm6375'
      kernel_branch:
        description: '内核源码分支'
        required: true
        default: 'oppo/sm6375_t_13.1.0_oppo_a1_5g'
      kernel_version_folder:
        description: '内核文件夹名'
        required: true
        default: 'msm-5.4'
      defconfig:
        description: '配置文件名称'
        required: true
        default: 'PHS110_defconfig'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git ccache automake flex lzop bison gperf build-essential \
          clang-11 lld-11 llvm-11 \
          gcc g++ make bc bison flex libssl-dev \
          zip unzip curl python3 device-tree-compiler

    - name: Set swap to 15G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 15

    - name: Download GCC 4.9 (AArch64 + ARM32)
      run: |
        git clone https://github.com/stormbreaker-project/aarch64-linux-android-4.9 gcc64
        git clone https://github.com/stormbreaker-project/arm-linux-androideabi-4.9 gcc32

    - name: Clone Proprietary Drivers
      run: |
        git clone \
          --branch ${{ github.event.inputs.proprietary_branch }} \
          ${{ github.event.inputs.proprietary_repo }} proprietary_drivers

    - name: Move Proprietary Folders
      run: |
        cd proprietary_drivers
        sudo mv vendor / 2>/dev/null || true
        sudo mv kernel /

    - name: Clone Kernel Source
      run: |
        git clone \
          --branch ${{ github.event.inputs.kernel_branch }} \
          ${{ github.event.inputs.kernel_repo }} kernel_source

    - name: Prepare Kernel Directory
      run: |
        sudo mkdir -p /kernel/${{ github.event.inputs.kernel_version_folder }}
        sudo cp -rf kernel_source/* /kernel/${{ github.event.inputs.kernel_version_folder }}/
        sudo rm -rf kernel_source
        
    - name: Set up LLVM
      uses: actions/setup-llvm@v4
      with:
        version: '11'       
        
    - name: Build Kernel (LLVM Clang)
      working-directory: /kernel/${{ github.event.inputs.kernel_version_folder }}
      run: |
        export LLVM=1
        export CC=clang
        export LD=ld.lld
        export LLVM_IAS=1
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        make O=out ${{ github.event.inputs.defconfig }}
        make -j$(nproc) O=out KCFLAGS="-Wno-error=section-mismatch"
   
    - name: Package AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AK3
        cp /kernel/${{ github.event.inputs.kernel_version_folder }}/out/arch/arm64/boot/Image.gz AK3/ || true
        sed -i 's/do.devicecheck=1/do.devicecheck=0/' AK3/anykernel.sh
        cd AK3 && zip -r9 ../Old-Kernel-AnyKernel3.zip *

    - name: Upload AnyKernel3 Zip
      uses: actions/upload-artifact@v4
      with:
        name: old-kernel-ak3
        path: Old-Kernel-AnyKernel3.zip
